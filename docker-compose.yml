networks:
  neuralflow-network:
    external: true
    name: neuralflow-network

volumes:
  hubiagency_data:

services:
  # ===================
  # MEDUSA ENGINE
  # ===================
  medusa:
    image: medusajs/medusa:2.0.3
    container_name: hubiagency-medusa
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      DATABASE_URL: postgresql://neuralflow:Iq%2FFctWkhkFulGNfSZBAWaKCmuETysEiUJxq5OanpLA%3D@postgres:5432/hubiagency
      REDIS_URL: redis://:xGDgrF5w7LS+jyV7m3T+KJIT5MJ30ONzzwY68N8YBxs=@redis-n8n:6379
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://n8n.neuralflow.space/webhook/hubiagency-order}
      HUBI_SIGNATURE_SECRET: ${HUBI_SIGNATURE_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      NODE_ENV: production
      TZ: America/Bogota
      PORT: 9000
      MEDUSA_ADMIN_CORS: ${CORS_ORIGIN:-http://localhost:3000}
      MEDUSA_STORE_CORS: ${CORS_ORIGIN:-http://localhost:3000}
      MEDUSA_MODE: ${MEDUSA_MODE:-production}
      LOG_LEVEL: info
    volumes:
      - ./backend:/app
      - hubiagency_data:/data
    networks:
      - neuralflow-network
    ports:
      - "9000:9000"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis-n8n:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===================
  # MEDUSA WORKER
  # ===================
  medusa-worker:
    image: medusajs/medusa:2.0.3
    container_name: hubiagency-medusa-worker
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: node_modules/.bin/medusa worker --no-live-update --resources
    environment:
      DATABASE_URL: postgresql://neuralflow:Iq%2FFctWkhkFulGNfSZBAWaKCmuETysEiUJxq5OanpLA%3D@postgres:5432/hubiagency
      REDIS_URL: redis://:xGDgrF5w7LS+jyV7m3T+KJIT5MJ30ONzzwY68N8YBxs=@redis-n8n:6379
      NODE_ENV: production
      TZ: America/Bogota
      LOG_LEVEL: info
    volumes:
      - ./backend:/app
    networks:
      - neuralflow-network
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.5'
        reservations:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'medusa worker' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis-n8n:
        condition: service_healthy
      medusa:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===================
  # MEILISEARCH (Optional)
  # ===================
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: hubiagency-meilisearch
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-hubiagency-meili-key-change-me}
      MEILI_ENV: ${MEILI_ENV:-production}
      MEILI_DB_PATH: /data.ms
      MEILI_HTTP_ADDR: 0.0.0.0:7700
      MEILI_LOG_LEVEL: info
    volumes:
      - hubiagency_data:/data.ms
    networks:
      - neuralflow-network
    ports:
      - "7700:7700"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7700/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
